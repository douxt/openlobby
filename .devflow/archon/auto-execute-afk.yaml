name: auto-execute-afk
description: AFK 自动执行 — TDD 实现→测试→双模型审查→PR→待审批（无人值守）
nodes:
  - id: setup
    bash: |
      # 从主项目同步 issue 文件到 worktree（worktree 从 main 创建，无 issue）
      ISSUE_PATH="$ARGUMENTS"
      MAIN=$(git worktree list --porcelain | grep "^worktree " | head -1 | cut -d" " -f2)
      ISSUE_NAME=$(basename "$ISSUE_PATH")
      mkdir -p issues
      if [ -f "$MAIN/$ISSUE_PATH" ]; then
        cp "$MAIN/$ISSUE_PATH" "issues/$ISSUE_NAME"
        echo "SETUP: issue $ISSUE_NAME synced from main project"
      elif [ -f "$MAIN/.archon/shared/$ISSUE_NAME" ]; then
        cp "$MAIN/.archon/shared/$ISSUE_NAME" "issues/$ISSUE_NAME"
        echo "SETUP: issue $ISSUE_NAME synced from shared cache"
      else
        echo "SETUP: WARN — cannot find issue file at $MAIN/$ISSUE_PATH"
      fi

  - id: implement
    depends_on: [setup]
    prompt: |
      阅读 issues/$(basename $ARGUMENTS)（已从主项目同步到 worktree）。

      ## 第1步：盘点状态
      1. 提取 issue 中所有 Acceptance Criteria（AC 清单）
      2. 运行 `git log --oneline -10` 查看已有提交
      3. 运行 `git diff main..HEAD --stat` 查看已改文件
      4. 逐条判断 AC：已实现则标记 ✅，未实现则标记 ❌
      5. 输出盘点结果表

      ## 第2步：实现未完成的 AC
      仅实现标记 ❌ 的 AC。TDD 流程：先写失败测试 → 最小实现 → 跑通。
      每个 AC 独立提交，commit message 引用 AC 编号。

      严格只实现 AC 列出的内容，禁止修改无关文件、禁止顺手重构、禁止加额外功能。
      每个 AC 独立验证：实现后必须运行相关测试确认通过。

      ## 如果所有 AC 均已实现
      输出 "ALL_AC_DONE" 并跳过实现。

  - id: ac-verify
    depends_on: [implement]
    prompt: |
      验证 issue（$ARGUMENTS）的所有 Acceptance Criteria 是否已实现。

      逐条 AC 对照代码：
      1. 读取 issue 文件，提取全部 AC
      2. 对每条 AC，在代码库中找到对应实现证据（具体文件:行号）
      3. 运行 `git diff main..HEAD --stat` 确认改动文件覆盖所有 AC 所需路径

      输出格式：
      | AC | 状态 | 证据 |
      |----|:----:|------|
      | AC1: xxx | ✅/❌ | file:line 或 "缺失" |

      如果有任何 AC 标记 ❌：输出 "AC_GAP" + 缺失清单，要求 implement 节点重跑。
      如果全部 ✅：输出 "AC_VERIFIED"。

  - id: validate
    depends_on: [ac-verify]
    bash: |
      cd $ARCHON_WORKSPACE
      TEST_CMD=$(grep -E '^\s+test_command:' .devflow/config.yaml 2>/dev/null | awk '{print $2}' | tr -d '"'"'" || echo "npm test")
      eval "$TEST_CMD" 2>&1 | tail -30

  - id: auto-review
    depends_on: [validate]
    prompt: |
      审查本次所有改动（git diff HEAD~1），按安全/性能/可维护性三个角度列问题。
      有问题的列出 file:line + 描述 + 严重级别(high/medium/low)。
      无问题输出 "CLEAN"。

  - id: cross-review
    depends_on: [validate]
    bash: |
      cd $ARCHON_WORKSPACE
      CROSS=$(grep -E '^\s+cross_review:' .devflow/config.yaml 2>/dev/null | awk '{print $2}' || echo "false")
      if [ "$CROSS" != "true" ]; then
        echo "CROSS_REVIEW_SKIPPED: config.yaml 中 cross_review=false"
        echo "---CROSS_REVIEW_DONE---"
        exit 0
      fi
      if curl -s http://localhost:3457/health >/dev/null 2>&1; then
        ANTHROPIC_BASE_URL=http://localhost:3457 \
        ANTHROPIC_AUTH_TOKEN=sk-maf-hub-mini-router \
        ANTHROPIC_MODEL=qwen3.7-max[1m] \
        CLAUDE_CODE_SUBAGENT_MODEL=qwen3.7-max \
        claude -p "审查本次所有改动（git diff HEAD~1），按安全/性能/可维护性三个角度列问题。有问题列出 file:line + 描述 + 严重级别(high/medium/low)。无问题输出 CLEAN。" --output-format text --max-turns 3 2>&1 | tee /tmp/cross-review-output.txt
        echo "---CROSS_REVIEW_DONE---"
      else
        echo "CROSS_REVIEW_SKIPPED: mini-router 离线，跳过 Qwen 交叉审查" | tee /tmp/cross-review-output.txt
        echo "---CROSS_REVIEW_DONE---"
      fi

  - id: merge-reviews
    depends_on: [auto-review, cross-review]
    prompt: |
      对比两份审查报告：
      【DeepSeek 审查】（auto-review 节点输出）
      【Qwen 审查】（cross-review 节点输出）

      1. 列出两份报告都发现的问题（高置信度）
      2. 列出只有一份报告发现的问题（需人工判断）
      3. 最终给出综合评分（1-10）
      格式：JSON {"common_issues":[...], "unique_issues":[...], "score":N}

  - id: create-pr
    depends_on: [merge-reviews]
    bash: |
      set -euo pipefail
      BRANCH=$(git rev-parse --abbrev-ref HEAD)
      EXISTING=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url' 2>/dev/null || echo "")
      if [ -n "$EXISTING" ]; then
        echo "PR_EXISTS: $EXISTING"
        echo "PR_URL: $EXISTING"
        exit 0
      fi
      git push -u origin "$BRANCH" 2>/dev/null || { echo "PUSH_FAILED"; exit 1; }
      TITLE=$(grep -m1 '^# ' "$ARGUMENTS" 2>/dev/null | sed 's/^# //' || basename "$ARGUMENTS" .md)
      BASE=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's|^refs/remotes/origin/||' || echo main)
      PR_URL=$(gh pr create --base "$BASE" --head "$BRANCH" --title "$TITLE" --body "审查完成，详见 workflow log" 2>&1)
      if [ $? -ne 0 ]; then
        echo "PR_CREATE_FAILED: $PR_URL"
        exit 1
      fi
      echo "PR_URL: $PR_URL"

  - id: mark-in-review
    depends_on: [create-pr]
    bash: |
      ISSUE_FILE="$ARGUMENTS"
      BRANCH=$(git rev-parse --abbrev-ref HEAD)
      PR_URL=$(grep -oP 'PR_URL:\s*\Khttps://[^\s]+' "$ARCHON_WORKSPACE/archon_output.log" 2>/dev/null || echo "")
      if [ -n "$PR_URL" ]; then
        if grep -q '^pr:' "$ISSUE_FILE"; then
          sed -i "s|^pr:.*|pr: [\"$PR_URL\"]|" "$ISSUE_FILE"
        else
          sed -i "/^---$/a pr: [\"$PR_URL\"]" "$ISSUE_FILE"
        fi
      fi
      sed -i 's/^status: in_progress$/status: in_review/' "$ISSUE_FILE"
      git add "$ISSUE_FILE" 2>/dev/null
      git commit -m "review: $(basename "$ISSUE_FILE" .md) — 待审批" 2>/dev/null || true
      git push -u origin "$BRANCH" 2>/dev/null || true
      for i in 1 2 3; do
        if git pull --rebase --quiet && git push --quiet; then exit 0; fi
        sleep $((i * 5))
      done
      exit 1

  - id: auto-merge
    depends_on: [mark-in-review]
    bash: |
      set -euo pipefail
      PR_URL=$(grep -oP 'PR_URL:\s*\Khttps://[^\s]+' "$ARCHON_WORKSPACE/archon_output.log" 2>/dev/null || echo "")
      if [ -z "$PR_URL" ]; then
        echo "AUTO_MERGE_SKIP: no PR URL"
        exit 0
      fi
      MAIN=$(git worktree list --porcelain | grep "^worktree " | head -1 | cut -d" " -f2)
      LAYER=$(bash "$MAIN/.devflow/scripts/check-layer.sh" main..HEAD 2>/dev/null || echo "APP")
      if [ "$LAYER" != "APP" ]; then
        echo "AUTO_MERGE_SKIP: $LAYER layer — 写 handoff 委托 A 合并"
        exit 0
      fi
      for i in $(seq 1 30); do
        CI_STATE=$(gh pr view "$PR_URL" --json state,statusCheckRollup --jq '.statusCheckRollup[0].state // "EXPECTED"' 2>/dev/null || echo "PENDING")
        case "$CI_STATE" in
          SUCCESS|EXPECTED) break ;;
          FAILURE|ERROR)
            echo "AUTO_MERGE_FAIL: CI $CI_STATE"
            exit 1 ;;
        esac
        sleep 10
      done
      gh pr merge "$PR_URL" --merge --delete-branch 2>&1 || { echo "AUTO_MERGE_FAIL: merge rejected"; exit 1; }
      ISSUE_FILE="$ARGUMENTS"
      sed -i 's/^status: in_review$/status: done/' "$ISSUE_FILE"
      git add "$ISSUE_FILE" 2>/dev/null
      git commit -m "done: $(basename "$ISSUE_FILE" .md) — auto-merged" 2>/dev/null || true
      git pull --rebase --quiet 2>/dev/null || true
      git push 2>/dev/null || true
      echo "AUTO_MERGE_DONE: $PR_URL"

  - id: write-summary
    depends_on: [auto-merge]
    bash: |
      set -euo pipefail
      ISSUE_FILE="$ARGUMENTS"
      ISSUE_SLUG=$(basename "$ISSUE_FILE" .md)
      MAIN=$(git worktree list --porcelain | grep "^worktree " | head -1 | cut -d" " -f2)
      SUMMARY="$MAIN/issues/${ISSUE_SLUG}-summary.md"
      LOG="$ARCHON_WORKSPACE/archon_output.log"

      PR_URL=$(grep -oP 'PR_URL:\s*\Khttps://[^\s]+' "$LOG" 2>/dev/null || echo "N/A")
      MERGE_ACTION=$(grep -oP 'AUTO_MERGE_\K(SKIP|DONE|FAIL).*' "$LOG" 2>/dev/null | tail -1 || echo "UNKNOWN")

      CROSS_STATUS="skipped (config)"
      if grep -q 'CROSS_REVIEW_SKIPPED.*offline' "$LOG" 2>/dev/null; then
        CROSS_STATUS="skipped (mini-router offline)"
      elif grep -q '\[cross-review\].*Completed' "$LOG" 2>/dev/null; then
        CROSS_DURATION=$(grep -oP '\[cross-review\].*Completed \(\K[0-9]+' "$LOG" 2>/dev/null || echo "?")
        [ "$CROSS_DURATION" -gt 100 ] && CROSS_STATUS="ran (${CROSS_DURATION}ms)" || CROSS_STATUS="skipped (fast exit, ${CROSS_DURATION}ms)"
      fi

      SCORE=$(grep -oP '"score"\s*:\s*\K[0-9]+' "$LOG" 2>/dev/null | tail -1 || echo "N/A")

      LAYER=$(bash "$MAIN/.devflow/scripts/check-layer.sh" main..HEAD 2>/dev/null || echo "?")

      cat > "$SUMMARY" << EOF
# Summary: ${ISSUE_SLUG}
@created: $(date -Iseconds)
@workflow: auto-execute-afk

## Review Results

| Reviewer | Status |
|----------|--------|
| DeepSeek (auto-review) | ran |
| Qwen (cross-review) | ${CROSS_STATUS} |

**Merge Score:** ${SCORE}/10

## Merge Decision

| Field | Value |
|-------|-------|
| Layer | ${LAYER} |
| Action | ${MERGE_ACTION} |
| PR | ${PR_URL} |

> Full output: logs/dispatch.log
EOF

      cd "$MAIN"
      git add "issues/${ISSUE_SLUG}-summary.md" 2>/dev/null || true
      git commit -m "summary: ${ISSUE_SLUG} — review + merge report" 2>/dev/null || true
      git pull --rebase --quiet 2>/dev/null || true
      git push 2>/dev/null || true
      echo "SUMMARY_WRITTEN: issues/${ISSUE_SLUG}-summary.md"
